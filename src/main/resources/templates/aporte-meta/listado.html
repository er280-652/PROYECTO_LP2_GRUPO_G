<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{::contenido})}">

<div th:fragment="contenido">
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<div class="row align-items-center">
					<div class="col-md-8">
						<h1 class="card-title">
							<i class="fa-solid fa-coins"></i> Aportes de la meta
						</h1>
						<p class="mb-0 text-muted">
							<span th:text="${meta.nombre}"></span>
						</p>
					</div>
					<div class="col-md-2">
						<a th:href="@{/meta/listado}" class="btn btn-outline-dark w-100">
							<i class="fa-solid fa-reply"></i> Volver
						</a>
					</div>
					<div class="col-md-2">
						<a th:if="${meta.completada != true and meta.fechaLimitePasada != true}"
						   th:href="@{/aporte-meta/nuevo/{id}(id=${meta.idMeta})}"
						   class="btn btn-success w-100">
							<i class="fa-solid fa-plus"></i> Crear
						</a>
						<button th:if="${meta.completada == true or meta.fechaLimitePasada == true}" class="btn btn-secondary w-100" disabled>
							<i class="fa-solid fa-ban"></i> Crear
						</button>
					</div>
				</div>
				<hr>

				<div class="row mb-3 text-center">
					<div class="col-md-3">
						<div class="border rounded p-3 bg-light">
							<div class="fw-bold">Monto objetivo</div>
							<div th:text="|S/. ${#numbers.formatDecimal(meta.montoObjetivo, 1, 'COMMA', 2, 'POINT')}|"></div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="border rounded p-3 bg-light">
							<div class="fw-bold">Monto actual</div>
							<div th:text="|S/. ${#numbers.formatDecimal(meta.montoActual, 1, 'COMMA', 2, 'POINT')}|"></div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="border rounded p-3 bg-light">
							<div class="fw-bold">Restante</div>
							<div th:text="|S/. ${#numbers.formatDecimal(meta.montoRestante, 1, 'COMMA', 2, 'POINT')}|"></div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="border rounded p-3 bg-light">
							<div class="fw-bold">Estado</div>
							<span class="badge" th:classappend="${meta.badgeEstado}" th:text="${meta.estadoDescripcion}"></span>
						</div>
					</div>
				</div>

				<div class="table-responsive">
					<table id="tbl-aporte-meta" class="table table-hover table-responsive">
						<thead class="table-dark text-center">
							<tr>
								<th>ID</th>
								<th>Fecha</th>
								<th>Monto</th>
								<th>Observación</th>
								<th>Estado</th>
								<th>Movimiento</th>
								<th>Acciones</th>
							</tr>
						</thead>

						<tbody class="table-secondary">
							<tr th:each="item : ${lstAportes}">
								<td th:text="${item.idAporte}" class="text-center"></td>
								<td th:text="${item.fecha}" class="text-center"></td>
								<td th:attr="data-order=${item.montoAporte}"
									th:text="|S/. ${#numbers.formatDecimal(item.montoAporte, 1, 'COMMA', 2, 'POINT')}|"
									class="text-end"></td>
								<td th:text="${item.observacion}"></td>
								<td class="text-center">
									<span class="badge" th:classappend="${item.activo} ? 'bg-success' : 'bg-secondary'" th:text="${item.activoDescripcion}"></span>
								</td>
								<td class="text-center">
									<a th:if="${item.movimiento != null}"
									   th:href="@{/movimiento/edicion/{id}(id=${item.movimiento.idMovimiento})}"
									   class="btn btn-outline-dark btn-sm"
									   title="Ver movimiento asociado">
										#<span th:text="${item.movimiento.idMovimiento}"></span>
									</a>
									<span th:if="${item.movimiento == null}" class="text-muted">Sin movimiento</span>
								</td>
								<td class="text-center">
									<div class="d-flex justify-content-center align-items-center gap-2">
										<a th:href="@{/aporte-meta/edicion/{id}(id=${item.idAporte})}" class="btn btn-outline-primary btn-sm" title="Editar">
											<i class="fa-regular fa-pen-to-square"></i> Editar
										</a>
										<form method="post" th:action="@{/aporte-meta/cambiar-estado}">
											<input type="hidden" th:name="id" th:value="${item.idAporte}">
											<button type="submit" class="btn btn-sm"
												th:classappend="${item.activo} ? 'btn-outline-danger' : 'btn-outline-success'"
												th:title="${item.activo} ? 'Desactivar' : 'Activar'">
												<i class="fa-solid" th:classappend="${item.activo} ? 'fa-toggle-off' : 'fa-toggle-on'"></i>
												<span th:text="${item.activo} ? 'Desactivar' : 'Activar'"></span>
											</button>
										</form>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

			</div>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			$('#tbl-aporte-meta').DataTable({
				language: {
					emptyTable: "No hay aportes registrados para esta meta",
					search: "Buscar: ",
					url: 'https://cdn.datatables.net/plug-ins/2.0.3/i18n/es-ES.json'
				},
				order: [ [0, 'desc'] ],
				columnDefs: [
					{ targets: [0,3,6], orderable: false },
					{ targets: [0,2,4,5,6], searchable: false }
				]
			});
		});
	</script>
</div>
</html>
