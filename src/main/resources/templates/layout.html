<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layoutBase(contenido)">

<head>
    <title>Finanzas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<header class="header">
    <div class="container-fluid d-flex justify-content-between align-items-center py-2">
        <div class="btn-menu">
            <label for="btn-menu"><i class="fa-solid fa-bars"></i></label>
        </div>
        <div class="text-white">
            <h1 class="h5 m-0">
                Finanzas - Bienvenido,
                <span th:text="${session.fullName}"></span>
            </h1>
        </div>
    </div>
</header>

<input type="checkbox" id="btn-menu">

<div class="container-menu">
    <div class="cont-menu">

        <nav>
            <a th:href="@{/dashboard}">
                <i class="fa-solid fa-house"></i> Inicio
            </a>

            <a th:href="@{/movimiento/listado}">
                <i class="fa-solid fa-list"></i> Movimientos
            </a>

            <a th:href="@{/movimiento/ingresos/nuevo}" class="submenu-link">
                <i class="fa-solid fa-arrow-trend-up"></i> Nuevo ingreso
            </a>

            <a th:href="@{/movimiento/gastos/nuevo}" class="submenu-link">
                <i class="fa-solid fa-arrow-trend-down"></i> Nuevo gasto
            </a>

         

			<a th:href="@{/categoria/listado}">
			    <i class="fa-solid fa-layer-group"></i> Categorías
			</a>
            <a th:href="@{/usuario/listado}">
                <i class="fa-solid fa-user"></i> Perfil
            </a>

            <a href="#" id="cerrarSesionLink">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
            </a>
        </nav>

        <label for="btn-menu">
            <i class="fa-solid fa-xmark"></i>
        </label>

    </div>
</div>

<main class="main-content">
    <div class="container mt-5 pt-5" th:replace="${contenido}">
        [Contenido aquí]
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>

<script>
    $("#cerrarSesionLink").on("click", function () {
        Swal.fire({
            title: "¿Deseas cerrar sesión?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, cerrar",
            cancelButtonText: "No"
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/logout";
            }
        });
    });
</script>

<th:block th:utext="${alert}"></th:block>
<th:block th:utext="${toast}"></th:block>

</body>
</html>
