<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Categorías</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Bienvenido al Dashboard</h2>

    <a th:href="@{/categoria/nuevo}" class="btn btn-primary mb-3">
        Nueva Categoría
    </a>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="c : ${lstCategorias}">

                <td th:text="${c.idCategoria}"></td>

                <td th:text="${c.descripcion}"></td>

                <td th:text="${c.tipo}"></td>

                <td>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/categoria/edicion/{id}(id=${c.idCategoria})}">
                        Editar
                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<div th:if="${toast}" th:utext="${toast}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
