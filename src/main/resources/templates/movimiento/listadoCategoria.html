<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{::contenido})}">

<div th:fragment="contenido">

	<div class="container pt-4">

		<div class="card shadow border-0 mt-5">

			<div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
				<h4 class="mb-0">
					<i class="fa-solid fa-layer-group"></i> Categorías
				</h4>

				<a href="/categoria/nuevo" class="btn btn-primary fw-bold shadow-sm">
					<i class="fa-solid fa-plus me-1"></i> Nueva Categoría
				</a>
			</div>

			<div class="card-body">

				<div class="table-responsive">

					<table class="table table-bordered table-hover align-middle text-center">

						<thead class="text-white" style="background-color: #0d6efd;">
							<tr>
								<th>ID</th>
								<th>Descripción</th>
								<th>Tipo</th>
								<th>Acciones</th>
							</tr>
						</thead>

						<tbody>
							<tr th:each="c : ${lstCategorias}">
								<td th:text="${c.idCategoria}"></td>

								<td th:text="${c.descripcion}"></td>

								<td>
									<span th:if="${#strings.equalsIgnoreCase(c.tipo, 'ingreso')}"
										class="badge bg-success">
										INGRESO
									</span>

									<span th:if="${#strings.equalsIgnoreCase(c.tipo, 'gasto')}" class="badge bg-danger">
										GASTO
									</span>
								</td>

								<td>
								    <a class="btn btn-outline-primary btn-sm"
								       th:href="@{/categoria/edicion/{id}(id=${c.idCategoria})}">
								        <i class="fa-solid fa-pen-to-square"></i> Editar
								    </a>

								    <form th:action="@{/categoria/desactivar}"
								          method="post"
								          style="display:inline;">

								        <input type="hidden"
								               name="id"
								               th:value="${c.idCategoria}">

								        <button type="submit"
								                th:class="${c.activo} ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'"
								                onclick="return confirm('¿Deseas cambiar el estado de esta categoría?');">

								            <i th:class="${c.activo} ? 'fa-solid fa-toggle-on' : 'fa-solid fa-toggle-off'"></i>

								        </button>

								    </form>
								</td>
							</tr>

							<tr th:if="${#lists.isEmpty(lstCategorias)}">
								<td colspan="4" class="text-muted py-4">
									No hay categorías registradas.
								</td>
							</tr>
						</tbody>

					</table>

				</div>

			</div>

		</div>

	</div>

</div>

</html>
