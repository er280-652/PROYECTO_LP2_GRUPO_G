<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layoutBase(~{::contenido})}">

<div th:fragment="contenido">

    <div class="card shadow border-0">

        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">
                <i class="fa-solid fa-pen-to-square"></i>
                Editar Movimiento
            </h4>
        </div>

        <div class="card-body">

            <form th:action="@{/movimiento/guardar}"
                  th:object="${movimiento}"
                  method="post">

                <input type="hidden"
                       th:field="*{idMovimiento}">

                <div class="mb-3">
                    <label class="form-label">
                        Fecha
                    </label>

                    <input type="date"
                           class="form-control"
                           th:field="*{fecha}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Descripción
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{descripcion}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Monto
                    </label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{monto}"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Categoría
                    </label>

                    <select class="form-select"
                            th:field="*{categoria.idCategoria}"
                            required>

                        <option
                            th:each="c : ${categorias}"
                            th:value="${c.idCategoria}"
                            th:text="${c.descripcion}">
                        </option>

                    </select>
                </div>

                <button class="btn btn-warning">
                    <i class="fa-solid fa-save"></i>
                    Actualizar
                </button>

                <a href="/movimiento/listado"
                   class="btn btn-secondary">
                    Volver
                </a>

            </form>

        </div>

    </div>

</div>
</html>
