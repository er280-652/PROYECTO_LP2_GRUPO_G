<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{::contenido})}">

<div th:fragment="contenido">
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<h1 class="card-title text-center">Editar categoría de presupuesto</h1>
				<p class="text-center text-muted">
					Presupuesto de <span th:text="${presupuesto.mes}"></span> - <span th:text="${presupuesto.anio}"></span>
				</p>

				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						<form id="form-presupuesto-categoria" th:action="@{/presupuesto-categoria/guardar}" th:object="${presupuestoCategoria}" class="row g-2" method="post" novalidate>

							<input type="hidden" th:field="*{idPresupuestoCategoria}">

							<div class="col-md-12 position-relative">
								<label class="form-label">Categoría de gasto</label>
								<div class="input-group">
									<span class="input-group-text"><i class="fa-solid fa-layer-group"></i></span>
									<select class="form-select" th:field="*{categoria.idCategoria}" required>
										<option value="" selected hidden="hidden">--Seleccione--</option>
										<option th:each="item : ${categorias}" th:value="${item.idCategoria}" th:text="${item.descripcion}"></option>
									</select>
								</div>
							</div>

							<div class="col-md-12 position-relative">
								<label class="form-label">Monto asignado</label>
								<div class="input-group">
									<span class="input-group-text">S/.</span>
									<input type="number" step="0.01" min="0.01" class="form-control" th:field="*{montoAsignado}" placeholder="Ingrese un monto" required>
								</div>
							</div>

							<div class="col-md-12 d-flex justify-content-between mt-3">
								<a th:href="@{/presupuesto-categoria/listado/{id}(id=${presupuesto.idPresupuesto})}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>

								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Guardar
								</button>

								<button type="reset" class="btn btn-secondary">
									<i class="fa-solid fa-broom"></i> Limpiar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			$("#form-presupuesto-categoria").validate({
				rules: {
					"categoria.idCategoria": {
						required: true
					},
					montoAsignado: {
						required: true,
						min: 0.01
					}
				},
				messages: {
					"categoria.idCategoria": {
						required: "campo requerido"
					},
					montoAsignado: {
						required: "campo requerido",
						min: "el monto debe ser mayor a 0"
					}
				},
				errorElement: 'div',
				errorClass: 'invalid-tooltip',
				highlight: function (element) {
					$(element).addClass('is-invalid').removeClass('is-valid');
				},
				unhighlight: function (element) {
					$(element).removeClass('is-invalid').addClass('is-valid');
				}
			});
		});
	</script>
</div>
</html>
