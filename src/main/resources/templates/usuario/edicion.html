<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layoutBase(~{::contenido})">

<div th:fragment="contenido">
    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-body">

                <h2>Editar Usuario</h2>

                <form th:action="@{/usuario/guardar}"
                      method="post"
                      th:object="${usuario}">

                    <input type="hidden"
                           th:field="*{idUsuario}">

                    <div class="mb-3">
                        <label>Nombres</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nombres}">
                    </div>

                    <div class="mb-3">
                        <label>Apellidos</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{apellidos}">
                    </div>

                    <div class="mb-3">
                        <label>Cuenta</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{cuenta}">
                    </div>
				

                    <div class="mb-3">
                        <label>Tipo</label>
                        <select class="form-select"
                                th:field="*{tipo.idTipo}">
                            <option th:each="t : ${tipos}"
                                    th:value="${t.idTipo}"
                                    th:text="${t.descripcion}">
                            </option>
                        </select>
                    </div>

                    <button class="btn btn-primary w-100">
                        Actualizar
                    </button>

                </form>

            </div>
        </div>
    </div>
</div>

</html>
